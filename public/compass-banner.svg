<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="85%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade-left" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="40%" stop-color="#0d1117" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade-right" x1="1" x2="0" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0d1117" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="needle-n" x1="0" x2="0" y1="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="needle-s" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="280" fill="#0d1117"/>
  <rect width="1920" height="280" fill="url(#glow)"/>
  <rect width="1920" height="280" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="70" x2="1920" y2="70"/>
    <line x1="0" y1="140" x2="1920" y2="140"/>
    <line x1="0" y1="210" x2="1920" y2="210"/>
    <line x1="480" y1="0" x2="480" y2="280"/>
    <line x1="960" y1="0" x2="960" y2="280"/>
    <line x1="1440" y1="0" x2="1440" y2="280"/>
  </g>

  <!-- Compass Rose - positioned right side -->
  <g transform="translate(1520, 140)" opacity="0.35">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="108" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#1e293b" stroke-width="0.5"/>

    <!-- Degree ticks -->
    <g stroke="#334155" stroke-width="0.8">
      <!-- Major ticks every 30 degrees -->
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(0)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(30)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(60)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(90)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(120)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(150)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(180)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(210)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(240)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(270)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(300)"/>
      <line x1="0" y1="-95" x2="0" y2="-108" transform="rotate(330)"/>
    </g>
    <g stroke="#1e293b" stroke-width="0.5">
      <!-- Minor ticks every 15 degrees -->
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(15)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(45)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(75)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(105)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(135)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(165)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(195)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(225)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(255)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(285)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(315)"/>
      <line x1="0" y1="-98" x2="0" y2="-108" transform="rotate(345)"/>
    </g>

    <!-- Cardinal direction labels -->
    <text x="0" y="-118" text-anchor="middle" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" opacity="0.8">N</text>
    <text x="0" y="128" text-anchor="middle" fill="#475569" font-family="monospace" font-size="12" opacity="0.6">S</text>
    <text x="122" y="5" text-anchor="middle" fill="#475569" font-family="monospace" font-size="12" opacity="0.6">E</text>
    <text x="-122" y="5" text-anchor="middle" fill="#475569" font-family="monospace" font-size="12" opacity="0.6">W</text>

    <!-- 8-point star / compass rose points -->
    <!-- North -->
    <polygon points="0,-85 -8,0 0,-15 8,0" fill="url(#needle-n)" opacity="0.9"/>
    <!-- South -->
    <polygon points="0,85 -8,0 0,15 8,0" fill="url(#needle-s)" opacity="0.7"/>
    <!-- East -->
    <polygon points="85,0 0,-8 15,0 0,8" fill="#1e293b" opacity="0.7"/>
    <!-- West -->
    <polygon points="-85,0 0,-8 -15,0 0,8" fill="#1e293b" opacity="0.7"/>

    <!-- Intercardinal points (smaller) -->
    <polygon points="60,-60 -3,3 5,-5 3,-3" fill="#1e293b" opacity="0.5" transform="rotate(0)"/>
    <polygon points="60,60 -3,-3 5,5 3,3" fill="#1e293b" opacity="0.5"/>
    <polygon points="-60,60 3,-3 -5,5 -3,3" fill="#1e293b" opacity="0.5"/>
    <polygon points="-60,-60 3,3 -5,-5 -3,-3" fill="#1e293b" opacity="0.5"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#0d1117" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="0" r="1.5" fill="#00e5ff" opacity="0.6"/>

    <!-- Inner decorative ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>

  <!-- Second smaller compass - left area, more subtle -->
  <g transform="translate(200, 180) scale(0.4)" opacity="0.15">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#c084fc" stroke-width="0.5"/>
    <polygon points="0,-85 -8,0 0,-15 8,0" fill="#c084fc" opacity="0.6"/>
    <polygon points="0,85 -8,0 0,15 8,0" fill="#334155" opacity="0.5"/>
    <polygon points="85,0 0,-8 15,0 0,8" fill="#334155" opacity="0.5"/>
    <polygon points="-85,0 0,-8 -15,0 0,8" fill="#334155" opacity="0.5"/>
    <circle cx="0" cy="0" r="4" fill="#0d1117" stroke="#c084fc" stroke-width="1"/>
  </g>

  <!-- Decorative arc lines -->
  <path d="M 800 280 Q 960 200 1120 280" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
  <path d="M 700 0 Q 960 80 1220 0" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.2"/>

  <!-- Fade overlays for blending with page -->
  <rect width="600" height="280" fill="url(#fade-left)"/>
  <rect x="1400" width="520" height="280" fill="url(#fade-right)"/>
</svg>
